wx:
  pay:
    enable: false
    appId: your-wx-app-id
    merchantId: your-merchant-id
    privateKey: cert/apiclient_key.pem
    merchantSerialNumber: your-merchant-serial-number
    apiV3Key: your-api-v3-key
    payNotifyUrl: https://your-domain.example.com/wx/payNotify
    refundNotifyUrl: https://your-domain.example.com/wx/refundNotify
